name: Update profile art

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes -- as close to "live" as a cron-based
                              # workflow can get without hammering the GitHub API
  push:
    branches: [main]         # also refresh whenever you push to this repo itself
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh-heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: UditGupta347
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Render stats + languages cards
        env:
          GH_PROFILE_USER: UditGupta347
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/make_stats_card.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg stats-card.svg langs-card.svg
          git diff --staged --quiet || git commit -m "chore: refresh contribution graph and stats"
          git push
